spring.application.name=Prj_Rest_Control_Almacen_Hardware

server.port=8080
# swagger-ui custom path
springdoc.swagger-ui.path=/swagger-ui.html
#http://localhost:8080/Rest_Control_Almacen_Hardware/swagger-ui/index.html
server.servlet.context-path=/Rest_Control_Almacen_Hardware

#Conexion a SqL SERVVER, AJUSTAR SI TU BASE DE DATOS TIENE UN PUERTO DIFERENTE
spring.datasource.url=jdbc:sqlserver://localhost:1433;database=DBRESTALMACEN;encrypt=true;trustServerCertificate=true

spring.datasource.username=backend_user
spring.datasource.password=backend123
# para spring security
spring.security.user.name=admin
spring.security.user.password=admin


# Esta línea desactiva la conversión automática de CamelCase a snake_case y minúsculas.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# o 'create', 'create-drop', 'validate'
