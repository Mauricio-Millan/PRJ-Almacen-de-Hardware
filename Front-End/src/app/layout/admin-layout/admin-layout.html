<div class="bg-gray-100 min-h-screen flex">
  <aside class="w-64 bg-white shadow-md hidden md:block">
    <div class="p-6 flex items-center justify-start space-x-4">
      <svg class="h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M12 6a2 2 0 100-4 2 2 0 000 4zm0 14a2 2 0 100-4 2 2 0 000 4zm6-8a2 2 0 100-4 2 2 0 000 4zm-12 0a2 2 0 100-4 2 2 0 000 4z"
        />
      </svg>
      <h1 class="text-2xl font-semibold text-gray-800">Sistema</h1>
    </div>

    <nav class="mt-6">
      <!-- Dashboard -->
      <a
        routerLink="/dashboard"
        routerLinkActive="bg-indigo-600 text-white"
        class="flex items-center px-4 py-2 mx-4 rounded-lg text-gray-700 hover:bg-indigo-500 hover:text-white transition-colors duration-200"
      >
        <svg
          class="h-6 w-6"
          xmlns="http://www.w3.org/2000/svg"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <!-- Chart Bar -->
          <path
            d="M2 11a1 1 0 011-1h2a1 1 0 011 1v6H3v-6zm5-4a1 1 0 011-1h2a1 1 0 011 1v10H7V7zm5-3a1 1 0 011-1h2a1 1 0 011 1v13h-4V4z"
          />
        </svg>
        <span class="mx-4">Dashboard</span>
      </a>

      <!-- Almacenes -->
      <a
        routerLink="/almacenes"
        routerLinkActive="bg-indigo-600 text-white"
        class="flex items-center mt-4 px-4 py-2 mx-4 rounded-lg text-gray-700 hover:bg-indigo-500 hover:text-white transition-colors duration-200"
      >
        <svg
          class="h-6 w-6"
          xmlns="http://www.w3.org/2000/svg"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <!-- Cube -->
          <path
            d="M10 2L2 7v6l8 5 8-5V7l-8-5zm0 2.18L16.74 7 10 11.82 3.26 7 10 4.18zM4 8.8L10 13.6l6-4.8V12l-6 3.75L4 12V8.8z"
          />
        </svg>
        <span class="mx-4">Almacenes</span>
      </a>

      <!-- Proveedores -->
      <a
        routerLink="/proveedores"
        routerLinkActive="bg-indigo-600 text-white"
        class="flex items-center mt-4 px-4 py-2 mx-4 rounded-lg text-gray-700 hover:bg-indigo-500 hover:text-white transition-colors duration-200"
      >
        <svg
          class="h-6 w-6"
          xmlns="http://www.w3.org/2000/svg"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <!-- Users -->
          <path
            d="M13 7a3 3 0 11-6 0 3 3 0 016 0zm-6 6a6 6 0 00-6 6h2a4 4 0 014-4h4a4 4 0 014 4h2a6 6 0 00-6-6H7z"
          />
        </svg>
        <span class="mx-4">Proveedores</span>
      </a>
      <a
        routerLink="/usuarios"
        routerLinkActive="bg-indigo-600 text-white"
        class="flex items-center mt-4 px-4 py-2 mx-4 rounded-lg text-gray-700 hover:bg-indigo-500 hover:text-white transition-colors duration-200"
      >
        <svg
          class="h-6 w-6"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M5.121 17.804A1 1 0 015 17V7a1 1 0 011-1h12a1 1 0 011 1v10a1 1 0 01-.121.476M8 10h8m-8 4h5"
          />
        </svg>
        <span class="mx-4">Usuarios</span>
      </a>
      <a
        routerLink="/marcas"
        routerLinkActive="bg-indigo-600 text-white"
        class="flex items-center mt-4 px-4 py-2 mx-4 rounded-lg text-gray-700 hover:bg-indigo-500 hover:text-white transition-colors duration-200"
      >
        <svg
          class="h-6 w-6"
          xmlns="http://www.w3.org/2000/svg"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <!-- Tag icon -->
          <path d="M3 2a1 1 0 011-1h4l7 7-6 6-7-7V3zM5 5a1 1 0 100 2 1 1 0 000-2z" />
        </svg>
        <span class="mx-4">Marcas</span>
      </a>
      <!-- Productos -->
      <a
        routerLink="/productos"
        routerLinkActive="bg-indigo-600 text-white"
        class="flex items-center mt-4 px-4 py-2 mx-4 rounded-lg text-gray-700 hover:bg-indigo-500 hover:text-white transition-colors duration-200"
      >
        <svg
          class="h-6 w-6"
          xmlns="http://www.w3.org/2000/svg"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <!-- Box icon -->
          <path d="M4 2h12l4 4v10a2 2 0 01-2 2H4a2 2 0 01-2-2V4l4-2z" />
        </svg>
        <span class="mx-4">Productos</span>
      </a>
      <!-- Clientes -->
      <a
        routerLink="/clientes"
        routerLinkActive="bg-indigo-600 text-white"
        class="flex items-center mt-4 px-4 py-2 mx-4 rounded-lg text-gray-700 hover:bg-indigo-500 hover:text-white transition-colors duration-200"
      >
        <svg
          class="h-6 w-6"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M16 11c1.656 0 3-1.343 3-3s-1.344-3-3-3-3 1.343-3 3 1.344 3 3 3zM8 11c1.656 0 3-1.343 3-3S9.656 5 8 5s-3 1.343-3 3 1.344 3 3 3zm0 2c-2.667 0-8 1.333-8 4v2h16v-2c0-2.667-5.333-4-8-4zm8 0c-.29 0-.577.014-.861.04 1.114.864 1.861 1.946 1.861 3.01v2h8v-2c0-2.667-5.333-4-8-4z"
          />
        </svg>
        <span class="mx-4">Clientes</span>
      </a>
    </nav>
  </aside>

  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="flex items-center justify-between p-6 bg-white border-b">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">Dashboard</h1>
      </div>

      <div class="relative w-2/5">
        <span class="absolute inset-y-0 left-0 pl-3 flex items-center">
          <svg
            class="h-5 w-5 text-indigo-600"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
          >
            <path
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </span>
        <input
          class="w-full bg-gray-100 pl-10 pr-4 py-2 border border-transparent rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
          type="text"
          placeholder="Search here..."
        />
      </div>

      <div class="relative">
        <button (click)="toggleDropdown()" class="flex items-center space-x-3 focus:outline-none">
          <img
            class="h-10 w-10 rounded-full object-cover"
            src="https://cdn-icons-png.flaticon.com/512/219/219983.png"
            alt="Avatar de usuario"
          />
          <div class="text-left">
            <p class="text-sm font-semibold">Musfiq</p>
            <p class="text-xs text-gray-500">Admin</p>
          </div>
          <svg
            class="h-5 w-5 text-gray-500"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
              clip-rule="evenodd"
            />
          </svg>
        </button>

        <div
          *ngIf="isDropdownOpen"
          class="absolute right-0 mt-2 w-48 bg-white rounded-md overflow-hidden shadow-xl z-10"
        >
          <a
            href="#"
            class="block px-4 py-2 text-sm text-gray-700 hover:bg-indigo-600 hover:text-white"
            >Cerrar Sesión</a
          >
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
